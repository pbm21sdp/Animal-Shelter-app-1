<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Tails</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
            font-size: 14px;
        }

        .header .active {
            font-weight: bold;
        }

        .hero {
            position: relative;
            padding: 50px;
            height: 500px;
        }

        .circle-purple, .circle-orange, .circle-pink {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .circle-purple {
            width: 300px;
            height: 300px;
            background-color: rgba(215, 163, 239, 0.5);
            top: 512px;
            left: 35%;
        }

        .circle-orange {
            width: 500px;
            height: 500px;
            background-color: #FFA59C;
            top: 80px;
            right: 50px;
        }

        .circle-pink {
            width: 400px;
            height: 400px;
            background-color: #eeb6e7;
            top: 120px;
            left: 350px;
            z-index: -2;
        }

        .nav-link {
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #333;
            text-decoration: none;
        }

        .nav-link-active {
            font-weight: bold;
        }

        .content {
            margin-top: 100px;
            margin-left: 80px;
        }

        .content-text {
            font-size: 32px;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
        }

        .cta-button {
            background-color: #FFA59C;
            color: #fff;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .cta-button:hover {
            background-color: #f78b89;
        }

        .dog-image {
            position: absolute;
            bottom: 0;
            right: 110px;
            width: 400px;
            height: auto;
            
        }
        </style>
</head>
<body>
    <nav class="header">
        <a href="#" class="nav-link">ABOUT US</a>
        <a href="#" class="nav-link" style="font-weight: bold;">OUR ANIMALS</a>
        <a href="#" class="nav-link">OUR STORE</a>
        <a href="#" class="nav-link">CONTACT</a>
    </nav>

    <section class="hero">
        <div class="circle-purple" style="background-color:#E8CCFB; left:50%; top:-100px;"></div>
        <div class="circle-orange"></div>
        <div class="circle-pink"></div>

        <div class="hero-text">
            <h1 class="content-text">Happiness is closer <br> than you think</h1>
            <a href="#" class="cta-button">Let's Go!</a>
        <img src="proiect/labrador.png" alt="Dog" class="dog-image">
    </section>
</body>
</html>
