version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: animal_shelter
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d  # Relative to backend dir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d animal_shelter"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .  # Build from current (backend) directory
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=animal_shelter
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

networks:
  shelter-network: